<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/todoimg.png">
</head>
<body>
    <div class="container">
        <h2>My To-Do List</h2>
        <div class="input-container">
            <input id="addtask" type="text" placeholder="Add a new task...">
            <button id="submit">Add Task</button>
        </div>
        <h3>Pending Tasks</h3>
        <ul id="pend"></ul>
        <h3>Completed Tasks</h3>
        <ul id="complete"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
